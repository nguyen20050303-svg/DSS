name: Build and Deploy to Azure Web App (Python)

on:
  push:
    branches:
      - main
      - AnhTuan
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code từ GitHub repository
      - name: Checkout GitHub Repository
        uses: actions/checkout@v3

      # Step 2: Cấu hình Node.js để build React Frontend
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Step 3: Cài đặt thư viện và build React Frontend
      - name: Install and Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # Step 4: Thiết lập Python (cho phép kiểm tra cấu hình)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 5: Triển khai toàn bộ ứng dụng (gồm cả frontend/dist đã build) lên Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'DSS' # Tên Web App mới tạo trên Azure
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
